name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  rust:
    name: Rust lint and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout compatibility frontends
        uses: actions/checkout@v4
        with:
          path: rustscript-compat-frontends
      - name: Checkout RustScript / pd-vm
        uses: actions/checkout@v4
        with:
          repository: rustscript-lang/rustscript
          path: rustscript
      - name: Checkout pd-edge sibling
        uses: actions/checkout@v4
        with:
          repository: rustscript-lang/pd-edge
          path: pd-edge
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        working-directory: rustscript-compat-frontends
        run: cargo fmt --all -- --check
      - name: Clippy
        working-directory: rustscript-compat-frontends
        run: cargo clippy --all-targets --all-features
      - name: Tests
        working-directory: rustscript-compat-frontends
        run: cargo test --all-targets --jobs 4
